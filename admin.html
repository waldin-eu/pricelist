<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SKU Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="admin-page">
  <main class="admin-wrap">
    <section id="loginView" class="admin-panel">
      <h1>SKU Admin</h1>
      <p class="muted">Password required to manage SKUs.</p>
      <form id="loginForm" class="admin-login-form">
        <input id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password" />
        <button type="submit">Unlock</button>
      </form>
      <p id="loginError" class="admin-error" hidden>Invalid password.</p>
    </section>

    <section id="appView" class="admin-panel" hidden>
      <div class="admin-topbar">
        <div>
          <h1>SKU Admin</h1>
          <p class="muted admin-subtitle">Manage SKU records, category assignment, and visibility.</p>
        </div>
        <div class="admin-top-actions">
          <button id="newBtn" type="button">+ New SKU</button>
          <a class="admin-link" href="index.html">Open menu</a>
          <button id="logoutBtn" type="button" class="admin-btn-secondary">Lock</button>
        </div>
      </div>

      <div class="admin-stats" id="adminStats"></div>

      <section class="admin-list">
        <div class="admin-list-controls">
          <input id="searchInput" type="text" placeholder="Search SKU, name, category..." />
          <select id="categoryFilter">
            <option value="">All categories</option>
          </select>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>SKU</th>
                <th>EAN</th>
                <th>Category</th>
                <th>Name</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="skuTableBody"></tbody>
          </table>
        </div>
        <p class="admin-help">Tip: click any row to edit. New SKUs need both SKU and EAN to appear on product pages.</p>
      </section>
    </section>

    <div id="editorModal" class="admin-modal" hidden>
      <div id="modalBackdrop" class="admin-modal-backdrop"></div>
      <section class="admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="admin-modal-head">
          <h2 id="modalTitle">Edit SKU</h2>
          <button id="modalCloseBtn" type="button" class="admin-icon-btn" aria-label="Close">✕</button>
        </div>
        <div class="admin-form-fields">
          <label>SKU<input id="fSku" type="text" /></label>
          <label>EAN<input id="fEan" type="text" /></label>
          <label>Category
            <select id="fCategory"></select>
          </label>
          <label>Name<input id="fName" type="text" /></label>
          <label>Description<textarea id="fDescription" rows="4"></textarea></label>
          <label>Color<input id="fColor" type="text" /></label>
          <label>Material<input id="fMaterial" type="text" /></label>
          <label>Product Dimensions and Weight<textarea id="fProductDimensions" rows="3"></textarea></label>
          <label>Dimensions and Weight of the Shipment<textarea id="fShipmentDimensions" rows="3"></textarea></label>
          <label>Brutto Price (€)<input id="fBruttoPrice" type="text" /></label>
        </div>
        <div class="admin-actions">
          <button id="saveBtn" type="button">Save</button>
          <button id="removeBtn" type="button" class="admin-btn-danger">Remove SKU</button>
          <button id="restoreBtn" type="button" class="admin-btn-secondary">Restore SKU</button>
          <button id="deleteOverrideBtn" type="button" class="admin-btn-secondary">Delete Override</button>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
