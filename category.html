<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Category</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="category-page">
  <main class="category-wrap">
    <section class="category-panel">
      <div class="category-top">
        <a class="category-back" href="index.html">Back to categories</a>
        <h1 id="title" class="category-title">Category</h1>
      </div>

      <div class="category-bar">
        <input id="q" placeholder="Search products..." />
        <label for="lang" class="lang-label">Language</label>
        <select id="lang" aria-label="Language">
          <option value="en">English</option>
          <option value="it">Italiano</option>
        </select>
      </div>

      <div id="out" class="category-out"></div>
    </section>
  </main>

  <!-- CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/category.js"></script>
  <script src="js/site-meta.js"></script>
</body>
</html>
