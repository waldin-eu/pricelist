<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Category</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="category-page">
  <main class="category-wrap">
    <section class="category-panel">
      <div class="category-top">
        <a id="back-link" class="category-back" href="index.html">Back to menu</a>
        <h1 id="title" class="category-title">Category</h1>
      </div>

      <div class="category-bar">
        <input id="q" placeholder="Search products..." />
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-flag" data-lang="en" title="English" aria-label="English">🇬🇧</button>
          <button type="button" class="lang-flag" data-lang="it" title="Italiano" aria-label="Italiano">🇮🇹</button>
        </div>
      </div>

      <div id="out" class="category-out"></div>
    </section>
  </main>

  <!-- CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/category.js"></script>
  <script src="js/site-meta.js"></script>
</body>
</html>
